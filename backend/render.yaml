# Configuración de despliegue en Render.com (plan gratuito)
# Ver instrucciones completas en README.md, sección "Despliegue"
services:
  - type: web
    name: bgu-dashboard-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
